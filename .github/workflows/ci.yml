name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' || exit 1"
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Enable ESM package.json for CI-only
        # Write a temporary package.json that includes "type":"module" so Vite (ESM) can be loaded in CI
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.type='module';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          # Ensure DB auto-connect picks up this URI
          MONGO_URI: ${{ secrets.MONGO_URI }}
          ENVIRONMENT: ci
          # Use repository secrets for client creds (repo uses CLIENT_ID/CLIENT_SECRET)
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          EVENTSUB_SECRET: ${{ secrets.EVENTSUB_SECRET }}
        run: npm run test
